<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>PlastiColor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    header {
      padding: 12px 24px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo  { font-size: 1.4rem; font-weight: 800; letter-spacing: 3px; color: #1a1a1a; }
    .tagline { font-size: 0.78rem; color: #888; }

    /* ─── FOOTER ─── */
    .site-footer {
      flex-shrink: 0;
      padding: 8px 20px;
      background: #fafafa;
      border-top: 1px solid #e0e0e0;
      font-size: 0.72rem;
      color: #999;
      text-align: center;
      line-height: 1.5;
    }
    .site-footer a {
      color: #555;
      text-decoration: none;
    }
    .site-footer a:hover { text-decoration: underline; color: #111; }

    /* ─── LAYOUT ─── */
    main { display: flex; flex: 1; overflow: hidden; }

    /* ─── LEFT PANEL ─── */
    aside {
      width: 285px;
      min-width: 285px;
      background: #fafafa;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-section { padding: 14px 16px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
    .section-title {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #999;
      margin-bottom: 10px;
    }
    #colors-list-section { flex: 1; overflow-y: auto; padding: 14px 16px; border-bottom: 1px solid #e0e0e0; }

    #add-btn {
      width: 100%;
      padding: 9px 14px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      color: #333;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    #add-btn:hover { background: #f0f0f0; border-color: #aaa; }

    .palette-io-row {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .io-btn {
      flex: 1; min-width: 0; padding: 7px 10px;
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      color: #555; font-size: 0.78rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .io-btn:hover:not(:disabled) {
      background: #f0f0f0; border-color: #aaa; color: #222;
    }
    .io-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Color rows */
    .color-row {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      box-sizing: border-box;
      width: 100%;
      overflow: hidden;
    }
    .color-row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 2px solid rgba(0,0,0,0.1);
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch:hover { transform: scale(1.12); border-color: rgba(0,0,0,0.3); }
    .color-hex { font-size: 0.76rem; font-family: monospace; color: #555; flex: 1; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      padding: 3px 5px; border-radius: 4px; font-size: 0.85rem; line-height: 1;
      transition: background 0.15s;
    }
    .edit-btn  { color: #666; }
    .edit-btn:hover  { background: rgba(0,0,0,0.06); }
    .remove-btn { color: #c44; }
    .remove-btn:hover { background: rgba(204,68,68,0.1); }

    .slider-row { display: flex; align-items: center; gap: 6px; }
    .slider-lbl { font-size: 0.68rem; color: #888; width: 58px; flex-shrink: 0; }
    input[type="range"].prop-slider {
      flex: 1; min-width: 0; -webkit-appearance: none; appearance: none;
      height: 4px; background: #ddd; border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type="range"].prop-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #555; cursor: pointer;
    }
    input[type="range"].prop-slider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%; background: #555; border: none; cursor: pointer;
    }
    .slider-val { font-size: 0.73rem; font-family: monospace; color: #555; min-width: 34px; text-align: right; flex-shrink: 0; }

    /* Resultant + onglets Couches */
    .result-mode-tabs {
      display: flex; gap: 4px; margin-bottom: 10px;
      background: #f3f3f3; padding: 4px; border-radius: 8px; border: 1px solid #e0e0e0;
    }
    .result-tab {
      flex: 1; padding: 7px 10px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; color: #888; background: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .result-tab:hover { color: #333; }
    .result-tab.active {
      background: #fff;
      color: #1a1a1a; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    #result-display-wrap {
      position: relative; width: 100%; height: 250px; border-radius: 8px;
      overflow: hidden; border: 1px solid #e0e0e0; margin-bottom: 6px; background: #f5f5f5;
    }
    .result-pane {
      position: absolute; inset: 0; display: none; width: 100%; height: 100%;
      z-index: 1;
    }
    .result-pane.active { display: block; z-index: 2; }
    #result-swatch { border: none; border-radius: 0; margin: 0; transition: background 0.2s; }
    /* Ne pas mettre display:block sur les canvas : ça écrase display:none de .result-pane */
    #layers-canvas, #sparkle-canvas {
      width: 100%; height: 100%;
      image-rendering: pixelated; image-rendering: crisp-edges;
      vertical-align: top;
    }
    #result-hex { font-size: 0.78rem; font-family: monospace; color: #555; text-align: center; }
    #layers-mix-row {
      display: flex; align-items: center; gap: 8px; margin-top: 8px; margin-bottom: 4px;
      flex-wrap: wrap;
    }
    #layers-mix-row.hidden { display: none; }
    #layers-mix-row label {
      font-size: 0.7rem; color: #888; flex-shrink: 0; width: 100%;
    }
    #layers-mix-slider {
      flex: 1; min-width: 0; -webkit-appearance: none; appearance: none;
      height: 4px; background: #ddd; border-radius: 2px; outline: none; cursor: pointer;
    }
    #layers-mix-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #555; cursor: pointer;
    }
    #layers-mix-slider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%; background: #555; border: none; cursor: pointer;
    }
    .layers-mix-val { font-size: 0.72rem; font-family: monospace; color: #555; min-width: 36px; text-align: right; flex-shrink: 0; }
    #empty-colors { color: #aaa; font-size: 0.8rem; text-align: center; padding: 18px 8px; }

    /* ─── RIGHT PANEL ─── */
    section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #swatch-controls {
      padding: 12px 16px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .ctrl-group {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px;
    }
    .ctrl-lbl { font-size: 0.72rem; color: #888; }
    .ctrl-group select {
      background: transparent; border: none; color: #333; font-size: 0.85rem; outline: none; cursor: pointer;
    }
    #generate-btn {
      padding: 8px 20px;
      background: #1a1a1a;
      border: none; border-radius: 8px; color: #fff;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    #generate-btn:hover { background: #333; }
    #swatch-count { font-size: 0.75rem; color: #888; }

    #swatch-scroll { flex: 1; overflow-y: auto; padding: 16px; user-select: none; }

    /* Swatches */
    .swatch-legend {
      display: flex; flex-wrap: wrap; gap: 12px;
      font-size: 0.72rem; font-family: monospace; color: #555; margin-bottom: 12px;
    }
    .swatch-legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; }

    .swatch-cell {
      border-radius: 4px; cursor: pointer; flex-shrink: 0;
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
    }
    .swatch-cell:hover { transform: scale(1.18); z-index: 2; }
    .swatch-cell.selected { border-color: #1a1a1a !important; transform: scale(1.18); z-index: 3; }

    /* Pastilles de couleurs composantes dans chaque case */
    .comp-dots {
      position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 2px; pointer-events: none;
    }
    .comp-dot {
      border-radius: 50%; flex-shrink: 0;
      outline: 1px solid rgba(0,0,0,0.35);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.4);
    }

    .swatch-empty { color: #aaa; font-size: 0.85rem; text-align: center; padding: 50px 20px; }

    /* ─── BULLE FLOTTANTE ─── */
    #swatch-tooltip {
      position: fixed;
      z-index: 500;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 210px;
      max-width: 270px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      pointer-events: none;
      user-select: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
    }
    #swatch-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tip-swatch { width: 100%; height: 172px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); margin-bottom: 6px; }
    .tip-hex { font-family: monospace; font-size: 0.88rem; color: #1a1a1a; text-align: center; }
    .tip-rgb { font-family: monospace; font-size: 0.68rem; color: #888; margin-top: 2px; text-align: center; margin-bottom: 10px; }
    .tip-props { display: flex; flex-direction: column; gap: 6px; }
    .tip-row { display: flex; align-items: center; gap: 7px; }
    .tip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.15); }
    .tip-bar-bg { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
    .tip-bar { height: 100%; background: #888; border-radius: 3px; }
    .tip-pct { font-size: 0.73rem; font-family: monospace; color: #333; width: 32px; text-align: right; flex-shrink: 0; }

    /* ─── MODAL ─── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    #modal-overlay.hidden { display: none; }
    #color-modal {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 22px;
      width: 600px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.15);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 0.95rem; }
    .modal-ral-block {
      padding-bottom: 10px;
      margin-bottom: 2px;
      border-bottom: 1px solid #e0e0e0;
    }
    .modal-row.ral-row { flex-wrap: nowrap; align-items: center; }
    .modal-row.ral-row label { width: 68px; flex-shrink: 0; }
    #ral-input { flex: 1; min-width: 0; }
    .ral-apply-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      color: #333;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ral-apply-btn:hover { background: #e0e0e0; }
    .ral-hint {
      font-size: 0.68rem;
      color: #888;
      margin: 6px 0 0 78px;
      line-height: 1.35;
      min-height: 1.2em;
    }
    .ral-hint.ral-hint-error { color: #c44; }
    #modal-close-btn { background: none; border: none; color: #999; font-size: 1rem; cursor: pointer; padding: 4px; }
    #modal-close-btn:hover { color: #333; }

    /* Wheel + preview côte à côte, preview s'étend sur toute la hauteur du panneau */
    #modal-body-row { display: flex; gap: 14px; align-items: stretch; }
    #modal-left-col  { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; width: 260px; }
    #wheel-wrap { position: relative; width: 260px; height: 260px; flex-shrink: 0; }
    #wheel-canvas, #cursor-canvas { position: absolute; top: 0; left: 0; border-radius: 50%; }
    #cursor-canvas { cursor: crosshair; }
    #preview-col { display: flex; flex-direction: column; gap: 6px; flex: 1; }

    /* Lightness */
    .modal-row { display: flex; align-items: center; gap: 10px; }
    .modal-row label { font-size: 0.72rem; color: #888; width: 75px; flex-shrink: 0; }
    #lightness-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 12px; border-radius: 6px; outline: none; cursor: pointer; border: 1px solid #ddd;
    }
    #lightness-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: white; cursor: pointer; border: 2px solid #bbb; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* Inputs */
    .modal-input {
      background: #fff; border: 1px solid #ddd; border-radius: 6px;
      color: #333; padding: 6px 10px; font-family: monospace; font-size: 0.82rem; outline: none;
    }
    .modal-input:focus { border-color: #aaa; }
    #hex-input { flex: 1; }
    input[type="number"].modal-input { width: 56px; -moz-appearance: textfield; }
    input[type="number"].modal-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* Preview (colonne à droite de la roue) */
    #old-preview, #new-preview { flex: 1; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); min-height: 60px; }

    /* Footer */
    .modal-footer { display: flex; gap: 10px; justify-content: space-between; }
    #modal-cancel-btn {
      padding: 8px 18px; background: #f5f5f5; border: 1px solid #ddd;
      border-radius: 8px; color: #555; cursor: pointer; font-size: 0.83rem; transition: background 0.15s;
    }
    #modal-cancel-btn:hover { background: #eaeaea; }
    #modal-confirm-btn {
      padding: 8px 18px; background: #1a1a1a;
      border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 0.83rem; font-weight: 600;
    }
    #modal-confirm-btn:hover { background: #333; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">PLASTICOLOR</div>
    <div class="tagline">Simulateur de mélange de couleurs plastiques</div>
  </div>
</header>

<main>
  <!-- ── LEFT PANEL ── -->
  <aside>
    <div class="panel-section">
      <button id="add-btn">＋ Ajouter une couleur</button>
    </div>

    <div id="colors-list-section">
      <div class="section-title">Couleurs sélectionnées</div>
      <div class="palette-io-row">
        <button type="button" class="io-btn" id="export-palette-btn" title="Enregistrer les couleurs et proportions dans un fichier JSON">Exporter</button>
        <button type="button" class="io-btn" id="import-palette-btn" title="Charger un fichier JSON précédemment exporté">Importer</button>
      </div>
      <input type="file" id="import-palette-input" accept=".json,application/json" hidden>
      <div id="colors-list">
        <div id="empty-colors">Aucune couleur ajoutée</div>
      </div>
    </div>

    <div class="panel-section" id="resultant-section" style="display:none;">
      <div class="result-mode-tabs" role="tablist">
        <button type="button" class="result-tab active" data-mode="blend" role="tab" aria-selected="true">Mélange</button>
        <button type="button" class="result-tab" data-mode="layers" role="tab" aria-selected="false">Couches</button>
        <button type="button" class="result-tab" data-mode="sparkle" role="tab" aria-selected="false">Paillettes</button>
      </div>
      <div id="result-display-wrap">
        <div id="result-swatch" class="result-pane active" data-pane="blend"></div>
        <canvas id="layers-canvas" class="result-pane" data-pane="layers" width="1" height="1" aria-label="Lignes horizontales selon les proportions"></canvas>
        <canvas id="sparkle-canvas" class="result-pane" data-pane="sparkle" width="1" height="1" aria-label="Paillettes selon les proportions"></canvas>
      </div>
      <div id="layers-mix-row" class="hidden">
        <label for="layers-mix-slider">Fusion entre les lignes</label>
        <input type="range" id="layers-mix-slider" min="0" max="100" value="0" step="1" title="Intensité du mélange">
        <span class="layers-mix-val" id="layers-mix-val">0%</span>
      </div>
      <div id="result-hex">#ffffff</div>
    </div>
  </aside>

  <!-- ── RIGHT PANEL ── -->
  <section>
    <div id="swatch-controls">
      <div class="ctrl-group">
        <span class="ctrl-lbl">Précision</span>
        <select id="steps-sel">
          <option value="5">Faible</option>
          <option value="10" selected>Normale</option>
          <option value="15">Haute</option>
          <option value="20">Très haute</option>
        </select>
      </div>
      <button id="generate-btn">▶ Générer le nuancier</button>
      <span id="swatch-count"></span>
    </div>

    <div id="swatch-scroll">
      <div class="swatch-empty">
        Ajoutez des couleurs puis cliquez sur <strong>Générer le nuancier</strong>
      </div>
    </div>

  </section>
</main>

<footer class="site-footer">
  <span>Crédits&nbsp;: <a href="https://quentino.io" target="_blank" rel="noopener noreferrer">Quentin Orhant</a></span>
  <span aria-hidden="true"> · </span>
  <span>Licence <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.fr" target="_blank" rel="noopener noreferrer">CC&nbsp;BY-SA&nbsp;4.0</a></span>
</footer>

<!-- ── BULLE PROPORTIONS ── -->
<div id="swatch-tooltip"></div>

<!-- ── MODAL ── -->
<div id="modal-overlay" class="hidden">
  <div id="color-modal">
    <div class="modal-header">
      <h3 id="modal-title">Ajouter une couleur</h3>
      <button id="modal-close-btn">✕</button>
    </div>

    <div class="modal-ral-block">
      <div class="modal-row ral-row">
        <label for="ral-input">Code RAL</label>
        <input type="text" id="ral-input" class="modal-input" placeholder="ex. 5015, RAL 3020" maxlength="20" autocomplete="off">
        <button type="button" class="ral-apply-btn" id="ral-apply-btn">Appliquer</button>
      </div>
      <p id="ral-hint" class="ral-hint" aria-live="polite"></p>
    </div>

    <div id="modal-body-row">
      <div id="modal-left-col">
        <div id="wheel-wrap">
          <canvas id="wheel-canvas" width="260" height="260"></canvas>
          <canvas id="cursor-canvas" width="260" height="260"></canvas>
        </div>
        <div class="modal-row">
          <label>Luminosité</label>
          <input type="range" id="lightness-slider" min="1" max="99" value="50">
        </div>
        <div class="modal-row">
          <label>HEX</label>
          <input type="text" class="modal-input" id="hex-input" value="#ff0000" maxlength="7">
        </div>
        <div class="modal-row">
          <label>RGB</label>
          <input type="number" class="modal-input" id="r-input" min="0" max="255" value="255">
          <input type="number" class="modal-input" id="g-input" min="0" max="255" value="0">
          <input type="number" class="modal-input" id="b-input" min="0" max="255" value="0">  
        </div>
        <div class="modal-footer">
          <button id="modal-cancel-btn">Annuler</button>
          <button id="modal-confirm-btn">Confirmer</button>
        </div> 
      </div>
      <div id="preview-col">
        <div id="old-preview" title="Couleur actuelle" style="display:none;"></div>
        <div id="new-preview" title="Nouvelle couleur" style="background:#ff0000;"></div>
      </div>
    </div>
  </div>

// COLOR MATH
// ════════════════════════════════════════════════════════

function hslToRgb(h, s, l) {
  // h: 0-360, s: 0-1, l: 0-1
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    return Math.round((l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1))) * 255);
  };
  return [f(0), f(8), f(4)];
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const l = (max + min) / 2;
  if (max === min) return [0, 0, l];
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  switch (max) {
    case r: h = ((g - b) / d + (g < b ? 6 : 0)) * 60; break;
    case g: h = ((b - r) / d + 2) * 60; break;
    case b: h = ((r - g) / d + 4) * 60; break;
  }
  return [h, s, l];
}

// Mélange soustractif CMY (identique à l'algo Python original)
function cmyMix(colors, proportions) {
  const total = proportions.reduce((a, b) => a + b, 0);
  if (total === 0) return [255, 255, 255];
  let C = 0, M = 0, Y = 0;
  colors.forEach(([r, g, b], i) => {
    const p = proportions[i];
    C += (1 - r / 255) * p;
    M += (1 - g / 255) * p;
    Y += (1 - b / 255) * p;
  });
  return [
    Math.round((1 - C / total) * 255),
    Math.round((1 - M / total) * 255),
    Math.round((1 - Y / total) * 255),
  ];
}

function toHex(rgb) {
  return '#' + rgb.map(v => clamp(v, 0, 255).toString(16).padStart(2, '0')).join('');
}

function fromHex(hex) {
  hex = hex.replace(/^#/, '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
  const n = parseInt(hex, 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

const WC = document.getElementById('wheel-canvas');

const WSIZE = 260, WRAD = 128;

function drawWheel(l) {
  const ctx = WC.getContext('2d');
  const imgData = ctx.createImageData(WSIZE, WSIZE);
  const px = imgData.data;
  const cx = WSIZE / 2, cy = WSIZE / 2;
  for (let y = 0; y < WSIZE; y++) {
    for (let x = 0; x < WSIZE; x++) {
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const i = (y * WSIZE + x) * 4;
      if (dist <= WRAD) {
        const h = ((Math.atan2(dy, dx) * 180 / Math.PI) + 360) % 360;
        const [r, g, b] = hslToRgb(h, dist / WRAD, l);
        px[i] = r; px[i+1] = g; px[i+2] = b; px[i+3] = 255;
      } else {
        px[i+3] = 0;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawCursor(h, s) {
  const ctx = CC.getContext('2d');
  ctx.clearRect(0, 0, WSIZE, WSIZE);
  const cx = WSIZE / 2, cy = WSIZE / 2;
  const ang = h * Math.PI / 180;
  const r = s * WRAD;
  const x = cx + r * Math.cos(ang);
  const y = cy + r * Math.sin(ang);
  ctx.beginPath();
  ctx.arc(x, y, 9, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.65)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, 9, 0, Math.PI * 2);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function refreshWheel() {
  drawWheel(pL);
  drawCursor(pH, pS);
  syncInputs();
}

function syncInputs() {
  const rgb = hslToRgb(pH, pS, pL);
  document.getElementById('new-preview').style.background = toHex(rgb);
  document.getElementById('hex-input').value = toHex(rgb);
  document.getElementById('r-input').value = rgb[0];
  document.getElementById('g-input').value = rgb[1];
  document.getElementById('b-input').value = rgb[2];
  // Update lightness slider gradient to reflect current hue/saturation
  const lo = toHex(hslToRgb(pH, pS, 0.02));
  const mid = toHex(hslToRgb(pH, pS, 0.5));
  const hi = toHex(hslToRgb(pH, pS, 0.98));
  document.getElementById('lightness-slider').style.background =
    `linear-gradient(to right, ${lo}, ${mid}, ${hi})`;
}

// ── Wheel mouse interaction ──
let dragging = false;

function pickFromWheel(e) {
  const rect = CC.getBoundingClientRect();
  const sx = WSIZE / rect.width, sy = WSIZE / rect.height;
  const x = (e.clientX - rect.left) * sx;
  const y = (e.clientY - rect.top) * sy;
  const dx = x - WSIZE / 2, dy = y - WSIZE / 2;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist <= WRAD) {
    pH = ((Math.atan2(dy, dx) * 180 / Math.PI) + 360) % 360;
    pS = Math.min(1, dist / WRAD);
    drawCursor(pH, pS);
    syncInputs();
  }
}

CC.addEventListener('mousedown', e => { dragging = true; pickFromWheel(e); });
document.addEventListener('mousemove', e => { if (dragging) pickFromWheel(e); });
document.addEventListener('mouseup', () => { dragging = false; });

// ── RAL (données intégrées depuis RAL.json : nom FR, rgb, hex) ──
function parseRalRgbString(rgbStr) {
  const parts = String(rgbStr).split(/[-–,]/).map(x => parseInt(String(x).trim(), 10));
  if (parts.length >= 3 && parts.slice(0, 3).every(n => !Number.isNaN(n)))
    return [clamp(parts[0], 0, 255), clamp(parts[1], 0, 255), clamp(parts[2], 0, 255)];
  return null;
}

function rgbFromRalEntry(entry) {
  if (!entry) return null;
  let rgb = fromHex(entry.hex);
  if (rgb) return rgb;
  return parseRalRgbString(entry.rgb);
}

function normalizeRalQuery(s) {
  return String(s || '').trim().replace(/^RAL[\s._-]*/i, '').replace(/\s+/g, '');
}

function lookupRalEntry(query) {
  const k = normalizeRalQuery(query);
  if (!k) return null;
  if (RAL_CODES[k]) return RAL_CODES[k];
  const trimmed = k.replace(/^0+/, '') || '0';
  if (RAL_CODES[trimmed]) return RAL_CODES[trimmed];
  return null;
}

function setRalHint(msg, isError) {
  const hint = document.getElementById('ral-hint');
  if (!hint) return;
  hint.textContent = msg || '';
  hint.classList.toggle('ral-hint-error', !!isError);
}

function applyRalCodeToPicker() {
  const input = document.getElementById('ral-input');
  const entry = lookupRalEntry(input && input.value);
  if (!entry) {
    setRalHint('Code RAL introuvable dans la base.', true);
    return;
  }
  const rgb = rgbFromRalEntry(entry);
  if (!rgb) {
    setRalHint('Données couleur invalides pour ce RAL.', true);
    return;
  }
  [pH, pS, pL] = rgbToHsl(...rgb);
  document.getElementById('lightness-slider').value = Math.round(pL * 100);
  setRalHint(`RAL ${entry.code} — ${entry.name}`, false);
  refreshWheel();
}

document.getElementById('ral-input').addEventListener('keydown', e => {

});

function refreshResultant() {

// ── Export / import palette (JSON) ──
function parsePaletteImport(data) {
  if (data == null || typeof data !== 'object') return null;
  let raw = null;
  if (data.format === 'plasticolor-palette' && Array.isArray(data.colors)) raw = data.colors;
  else if (Array.isArray(data.colors)) raw = data.colors;
  else if (Array.isArray(data)) raw = data;
  if (!Array.isArray(raw)) return null;

  const out = [];
  for (const entry of raw) {
    let rgb = null;
    let prop = 1;
    if (Array.isArray(entry) && entry.length >= 3) {
      rgb = [entry[0], entry[1], entry[2]];
      if (entry.length >= 4 && entry[3] != null) prop = entry[3];
    } else if (entry && typeof entry === 'object') {
      if (Array.isArray(entry.rgb) && entry.rgb.length >= 3) rgb = entry.rgb.slice(0, 3);
      else if (Array.isArray(entry.color) && entry.color.length >= 3) rgb = entry.color.slice(0, 3);
      else if (entry.r != null && entry.g != null && entry.b != null) rgb = [entry.r, entry.g, entry.b];
      else if (typeof entry.hex === 'string') rgb = fromHex(entry.hex);
      if (entry.proportion != null) prop = entry.proportion;
      else if (entry.p != null) prop = entry.p;
    }
    if (!rgb) continue;
    out.push({
      color: [
        clamp(Math.round(Number(rgb[0]) || 0), 0, 255),
        clamp(Math.round(Number(rgb[1]) || 0), 0, 255),
        clamp(Math.round(Number(rgb[2]) || 0), 0, 255),
      ],
      proportion: Math.max(0, Number(prop) || 0),
    });
  }
  return out;
}

function applyImportedPalette(entries) {
  palette = entries.map(({ color, proportion }) => ({
    id: uid++,
    color,
    proportion,
  }));
  hideTooltip();
  renderList();
  if (palette.length > 0) refreshResultant();
  else {
    document.getElementById('resultant-section').style.display = 'none';
    document.getElementById('result-hex').textContent = '#ffffff';
  }
}

document.getElementById('export-palette-btn').addEventListener('click', () => {

      rgb: [color[0], color[1], color[2]],

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `plasticolor-palette-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);

});

document.getElementById('import-palette-input').addEventListener('change', (e) => {

  reader.onload = () => {

      data = JSON.parse(reader.result);

      alert('Fichier JSON invalide ou illisible.');
      return;
    }
    const entries = parsePaletteImport(data);
    if (!entries) {
      alert('Format non reconnu. Utilisez un fichier exporté par Plasticolor ou un tableau de couleurs { rgb, proportion }.');

    applyImportedPalette(entries);

  reader.onerror = () => alert('Impossible de lire le fichier.');
  reader.readAsText(file, 'UTF-8');
});

// ── Vues Couches (lignes horizontales) & Paillettes ──
function shuffleInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/** Répartition entière de `total` unités selon les proportions (plus grands restes). */
function proportionCounts(total, props) {
  const n = props.length;
  const pos = props.map(p => Math.max(0, p));
  const totalP = pos.reduce((a, b) => a + b, 0);
  const weights = totalP <= 0 ? pos.map(() => 1) : pos;
  const tot = totalP <= 0 ? n : totalP;
  const exact = weights.map(p => (p / tot) * total);
  const counts = exact.map(e => Math.floor(e));
  let rem = total - counts.reduce((a, b) => a + b, 0);
  const fracs = exact.map((e, i) => ({ i, f: e - counts[i] }));
  fracs.sort((a, b) => b.f - a.f);
  for (let k = 0; k < rem; k++) counts[fracs[k].i]++;
  return counts;
}

function getResultViewMode() {
  const t = document.querySelector('.result-tab.active');
  const m = t && t.dataset.mode;
  if (m === 'layers' || m === 'sparkle') return m;
  return 'blend';
}

function setupPreviewCanvas(canvas, wrap) {
  const rect = wrap.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width));
  const h = Math.max(1, Math.floor(rect.height));
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const cw = Math.round(w * dpr);
  const ch = Math.round(h * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  return { ctx: canvas.getContext('2d'), cw, ch, w, h };
}

function lerpChannel(a, b, t) {
  return Math.round(a + (b - a) * t);
}
function lerpRgb(a, b, t) {
  if (t <= 0) return a.slice();
  if (t >= 1) return b.slice();
  return [
    lerpChannel(a[0], b[0], t),
    lerpChannel(a[1], b[1], t),
    lerpChannel(a[2], b[2], t),
  ];
}

/** Mélange chaque ligne avec la moyenne des couches voisines (intensité 0–1). */
function blendLayerStripes(stripes, mix) {
  const rows = stripes.length;
  if (mix <= 0 || rows === 0) return stripes.map(c => c.slice());
  const out = [];
  for (let y = 0; y < rows; y++) {
    const c = stripes[y];
    const prev = y > 0 ? stripes[y - 1] : c;
    const next = y < rows - 1 ? stripes[y + 1] : c;
    const neighborAvg = [
      (prev[0] + next[0]) / 2,
      (prev[1] + next[1]) / 2,
      (prev[2] + next[2]) / 2,
    ];
    out.push(lerpRgb(c, neighborAvg, mix));
  }
  return out;
}

/** Lignes horizontales 1 px (CSS), proportions puis ordre aléatoire ; fusion réglable. */
function drawLayersCanvas() {
  const wrap = document.getElementById('result-display-wrap');
  const canvas = document.getElementById('layers-canvas');
  if (!wrap || !canvas || palette.length === 0) return;

  const { ctx, cw, ch, w, h } = setupPreviewCanvas(canvas, wrap);
  const colors = palette.map(d => d.color);
  const props = palette.map(d => d.proportion);

  const mixSlider = document.getElementById('layers-mix-slider');
  const mix = mixSlider ? Math.min(1, Math.max(0, Number(mixSlider.value) / 100)) : 0;

  const rows = h;
  const counts = proportionCounts(rows, props);
  const stripes = [];
  for (let i = 0; i < colors.length; i++)
    for (let k = 0; k < counts[i]; k++) stripes.push(colors[i]);
  shuffleInPlace(stripes);

  let rowColors = blendLayerStripes(stripes, mix);
  // Second passage doux quand la fusion est forte (dégradé plus continu)
  if (mix > 0.45) {
    const mix2 = (mix - 0.45) / 0.55 * 0.55;
    rowColors = blendLayerStripes(rowColors, mix2);
  }

  let py = 0;
  for (let y = 0; y < rows; y++) {
    const rgb = rowColors[y] || [255, 255, 255];
    ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    const next = Math.round((y + 1) * (ch / rows));
    const segH = Math.max(1, next - py);
    ctx.fillRect(0, py, cw, segH);
    py = next;
  }
}

/** Une paillette : forme irrégulière autour de (cx, cy), taille de référence ~base. */
function drawIrregularSparkle(ctx, cx, cy, base, rgb) {
  const fill = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
  ctx.fillStyle = fill;
  const t = Math.random();

  if (t < 0.32) {
    // Polygone à sommets en rayon / angle bruités
    const n = 4 + Math.floor(Math.random() * 5);
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.85;
      const r = base * (0.35 + Math.random() * 0.75);
      const px = cx + Math.cos(ang) * r;
      const py = cy + Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  } else if (t < 0.55) {
    // Ovale déformé et penché
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((Math.random() - 0.5) * Math.PI);
    const rx = base * (0.2 + Math.random() * 0.55);
    const ry = base * (0.2 + Math.random() * 0.55);
    const tilt = (Math.random() - 0.5) * 1.2;
    ctx.beginPath();
    if (typeof ctx.ellipse === 'function')
      ctx.ellipse(0, 0, rx, ry, tilt, 0, Math.PI * 2);
    else {
      ctx.rotate(tilt);
      ctx.scale(1, ry / Math.max(rx, 0.001));
      ctx.arc(0, 0, rx, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.restore();
  } else if (t < 0.72) {
    // Grumeau : 2–4 pastilles qui se chevauchent
    const blobs = 2 + Math.floor(Math.random() * 3);
    for (let b = 0; b < blobs; b++) {
      const ox = (Math.random() - 0.5) * base * 1.1;
      const oy = (Math.random() - 0.5) * base * 1.1;
      const br = base * (0.22 + Math.random() * 0.42);
      ctx.beginPath();
      ctx.arc(cx + ox, cy + oy, br, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (t < 0.88) {
    // Éclat allongé (rectangle très étroit, pivoté)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.random() * Math.PI);
    const rw = base * (0.12 + Math.random() * 0.22);
    const rh = base * (0.9 + Math.random() * 1.1);
    ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
    ctx.restore();
  } else {
    // Trapèze / quadri latéralement déformé
    const w = base * (0.5 + Math.random() * 0.5);
    const h = base * (0.45 + Math.random() * 0.55);
    const skew = (Math.random() - 0.5) * base * 0.35;
    ctx.beginPath();
    ctx.moveTo(cx - w / 2 + skew, cy - h / 2);
    ctx.lineTo(cx + w / 2 - skew * 0.3, cy - h / 2);
    ctx.lineTo(cx + w / 2 + skew, cy + h / 2);
    ctx.lineTo(cx - w / 2 - skew * 0.5, cy + h / 2);
    ctx.closePath();
    ctx.fill();
  }
}

/** Paillettes irrégulières réparties selon les proportions, positions aléatoires. */
function drawSparkleCanvas() {
  const wrap = document.getElementById('result-display-wrap');
  const canvas = document.getElementById('sparkle-canvas');
  if (!wrap || !canvas || palette.length === 0) return;

  const { ctx, cw, ch } = setupPreviewCanvas(canvas, wrap);
  const colors = palette.map(d => d.color);
  const props = palette.map(d => d.proportion);

  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0, 0, cw, ch);

  const nSparkles = Math.min(10000, Math.max(400, Math.floor((cw * ch) / 10)));
  const counts = proportionCounts(nSparkles, props);
  const sparkles = [];
  for (let i = 0; i < colors.length; i++)
    for (let k = 0; k < counts[i]; k++) sparkles.push(colors[i]);
  shuffleInPlace(sparkles);

  for (let k = 0; k < nSparkles; k++) {
    const rgb = sparkles[k] || [255, 255, 255];
    const cx = Math.random() * cw;
    const cy = Math.random() * ch;
    const base = 5 * (1 + Math.floor(Math.random() * 3));
    drawIrregularSparkle(ctx, cx, cy, base, rgb);
  }
}

function redrawActivePreview() {
  const m = getResultViewMode();
  if (m === 'layers') drawLayersCanvas();
  else if (m === 'sparkle') drawSparkleCanvas();
}

document.querySelectorAll('.result-tab').forEach(btn => {

const layersMixSlider = document.getElementById('layers-mix-slider');
const layersMixVal = document.getElementById('layers-mix-val');
function updateLayersMixLabel() {
  if (layersMixVal && layersMixSlider) layersMixVal.textContent = `${layersMixSlider.value}%`;
}
if (layersMixSlider) {
  layersMixSlider.addEventListener('input', () => {
    updateLayersMixLabel();
    if (getResultViewMode() === 'layers') drawLayersCanvas();
  });
  updateLayersMixLabel();
}

let _layersResizeObs;
function initLayersResizeObserver() {
  const wrap = document.getElementById('result-display-wrap');
  if (!wrap || typeof ResizeObserver === 'undefined') return;
  if (_layersResizeObs) _layersResizeObs.disconnect();
  _layersResizeObs = new ResizeObserver(() => {
    if (palette.length > 0 && (getResultViewMode() === 'layers' || getResultViewMode() === 'sparkle'))
      redrawActivePreview();
  });
  _layersResizeObs.observe(wrap);
}
initLayersResizeObserver();

// ════════════════════════════════════════════════════════
// SWATCH GENERATION
// ════════════════════════════════════════════════════════

let selectedCell = null;

document.getElementById('generate-btn').addEventListener('click', () => {
  const steps = +document.getElementById('steps-sel').value;
  const n = palette.length;
  const scroll = document.getElementById('swatch-scroll');
  scroll.innerHTML = '';
  hideTooltip();
  selectedCell = null;

  if (n === 0) {
    scroll.innerHTML = '<div class="swatch-empty">Ajoutez au moins une couleur.</div>';
    return;
  }

  const colors = palette.map(d => d.color);
  const props  = palette.map(d => d.proportion);

  if      (n === 1) gen1(colors, props, scroll);
  else if (n === 2) gen2(colors, steps, scroll);
  else              genN(colors, steps, scroll);
});

// ── Helpers ──

function makeLegend(colors) {
  const el = document.createElement('div');
  el.className = 'swatch-legend';
  colors.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'swatch-legend-item';
    item.innerHTML =
      `<div class="legend-dot" style="background:${toHex(c)}"></div>Couleur ${i+1} — ${toHex(c).toUpperCase()}`;
    el.appendChild(item);
  });
  return el;
}

function makeCell(result, colors, props, size) {
  const cell = document.createElement('div');
  cell.className = 'swatch-cell';
  cell.style.cssText = `width:${size}px;height:${size}px;background:${toHex(result)};`;

  // ── Pastilles des couleurs composantes ──
  if (size >= 13) {
    const dotSize = size >= 28 ? 5 : (size >= 20 ? 4 : 3);
    const dotGap  = 2;
    const maxFit  = Math.max(1, Math.floor((size - 6) / (dotSize + dotGap)));

    const dots = props
      .map((p, i) => ({ p, i }))
      .filter(x => x.p > 0)
      .sort((a, b) => b.p - a.p)
      .slice(0, maxFit);

    if (dots.length > 0) {
      const row = document.createElement('div');
      row.className = 'comp-dots';
      dots.forEach(({ i }) => {
        const d = document.createElement('div');
        d.className = 'comp-dot';
        d.style.cssText = `width:${dotSize}px;height:${dotSize}px;background:${toHex(colors[i])};`;
        row.appendChild(d);
      });
      cell.appendChild(row);
    }
  }

  cell.addEventListener('click', e => {
    e.stopPropagation();
    if (selectedCell) selectedCell.classList.remove('selected');
    cell.classList.add('selected');
    selectedCell = cell;
    showTooltip(cell, result, colors, props);
  });
  return cell;
}

// 1 couleur
function gen1(colors, props, container) {
  const r = cmyMix(colors, props);
  const w = document.createElement('div');
  w.style.padding = '10px 0';
  w.appendChild(makeCell(r, colors, props, 70));
  container.appendChild(w);
  document.getElementById('swatch-count').textContent = '1 teinte';
}

// 2 couleurs → gradient linéaire
function gen2(colors, steps, container) {
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:3px;padding:4px 0;';
  const availW = document.getElementById('swatch-scroll').clientWidth - 32;
  const size = Math.max(20, Math.floor((availW - steps * 3) / (steps + 1)));
  for (let i = 0; i <= steps; i++) {
    const p = [steps - i, i];
    row.appendChild(makeCell(cmyMix(colors, p), colors, p, size));
  }
  container.appendChild(row);
  document.getElementById('swatch-count').textContent = `${steps + 1} teintes`;
}

// 3 couleurs → grille triangulaire
function gen3(colors, steps, container) {

  const grid = document.createElement('div');
  grid.style.cssText = 'display:flex;flex-direction:column;gap:3px;padding:4px 0;';
  const GAP = 3;
  const availW = document.getElementById('swatch-scroll').clientWidth - 32;
  const cellSize = Math.max(18, Math.floor((availW - steps * GAP) / (steps + 1)));

  // Ligne i : proportion couleur1 = steps-i, couleur2 = 0..i, couleur3 = i-couleur2
  for (let i = 0; i <= steps; i++) {
    const row = document.createElement('div');
    row.style.cssText = `display:flex;gap:${GAP}px;margin-left:${(steps - i) * (cellSize + GAP) / 2}px;`;
    for (let j = 0; j <= i; j++) {
      const p = [steps - i, j, i - j];
      row.appendChild(makeCell(cmyMix(colors, p), colors, p, cellSize));
    }
    grid.appendChild(row);
  }
  container.appendChild(grid);

  const total = (steps + 1) * (steps + 2) / 2;
  document.getElementById('swatch-count').textContent = `${total} teintes`;
}

// N ≥ 4 couleurs → tous les points du simplexe N-dimensionnel
// Affichage style nuancier professionnel : colonnes par teinte, clair→foncé dans chaque colonne
function genN(colors, steps, container) {
  const n = colors.length;

  // C(steps+n-1, n-1)
  function countCombinations(s) {
    let c = 1;
    for (let i = 1; i < n; i++) c = c * (s + i) / i;
    return Math.round(c);
  }

  // Plafond adaptatif : on tolère plus de cellules si les pas sont élevés
  const MAX_CELLS = 1200;
  let autoSteps = steps;
  while (autoSteps > 2 && countCombinations(autoSteps) > MAX_CELLS) autoSteps--;
  const total = countCombinations(autoSteps);


  // ── Génère tous les points du simplexe ──
  function simplexPoints(rem, dim) {
    if (dim === 1) return [[rem]];
    const out = [];
    for (let v = 0; v <= rem; v++)
      simplexPoints(rem - v, dim - 1).forEach(r => out.push([v, ...r]));
    return out;
  }

  const cells = simplexPoints(autoSteps, n).map(props => {
    const result = cmyMix(colors, props);
    const [h, s, l] = rgbToHsl(...result);
    const isFullMix = props.every(p => p > 0);
    return { result, props, h, s, l, isFullMix };
  });

  // ── Tri unifié : pas de séparation chromatiques/neutres ──
  // Pour les couleurs très peu saturées, on amplifie la teinte perçue à partir
  // de la dominante RGB afin qu'elles se placent près de leurs voisins chromatiques.
  cells.forEach(c => {
    if (c.s < 0.08) {
      const [r, g, b] = c.result;
      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      if (mx - mn >= 6) {
        // Amplifie le contraste pour extraire la teinte dominante
        const amp = v => Math.round(128 + (v - 128) * 8);
        c.sortH = rgbToHsl(amp(r), amp(g), amp(b))[0];
      } else {
        c.sortH = -1; // gris pur : sera trié par luminosité à part
      }
    } else {
      c.sortH = c.h;
    }
  });

  // Sépare les gris purs (sans teinte détectable) pour les insérer après le tri
  const pureGrays  = cells.filter(c => c.sortH === -1).sort((a, b) => b.l - a.l);
  const withHue    = cells.filter(c => c.sortH !== -1).sort((a, b) => a.sortH - b.sortH);

  // ── Rotation : démarrer après le plus grand vide de teinte ──
  if (withHue.length > 1) {
    let maxGap = withHue[0].sortH + 360 - withHue[withHue.length - 1].sortH;
    let startIdx = 0;
    for (let i = 1; i < withHue.length; i++) {
      const gap = withHue[i].sortH - withHue[i - 1].sortH;
      if (gap > maxGap) { maxGap = gap; startIdx = i; }
    }
    if (startIdx > 0) withHue.push(...withHue.splice(0, startIdx));
  }

  // Fusionne : chromatiques + teintés + gris purs en fin
  const sorted = [...withHue, ...pureGrays];

  // ── Colonnes d'égale taille ──
  // Tri interne : d'abord par bande de saturation (vif → moyen → neutre),
  // puis par luminosité décroissante au sein de chaque bande.
  // Cela évite qu'une couleur vive et un gris pâle de même luminosité
  // se retrouvent côte à côte uniquement parce que leur L est similaire.
  function colSort(a, b) {
    const band = c => c.s >= 0.4 ? 0 : c.s >= 0.15 ? 1 : 2;
    const da = band(a), db = band(b);
    return da !== db ? da - db : b.l - a.l;
  }

  const nCols  = Math.max(3, Math.ceil(Math.sqrt(sorted.length)));
  const colSz  = Math.ceil(sorted.length / nCols);
  const allCols = [];
  for (let i = 0; i < nCols; i++) {
    const col = sorted.slice(i * colSz, (i + 1) * colSz);
    if (col.length) allCols.push(col.sort(colSort));
  }
  if (allCols.length === 0) return;

  // ── Dimensions des cellules : carrées, remplissent la largeur disponible ──
  const GAP = 3;
  const availW = document.getElementById('swatch-scroll').clientWidth - 32;
  const cellW = Math.max(14, Math.floor((availW - allCols.length * GAP) / allCols.length));

  // ── Rendu ──
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;gap:3px;align-items:flex-start;padding:4px 0 8px;';

  allCols.forEach((col, i) => {

    const colEl = document.createElement('div');
    colEl.className = 'swatch-col';
    colEl.style.cssText = `display:flex;flex-direction:column;gap:${GAP}px;`;

    col.forEach(cd => {
      const cell = makeCell(cd.result, colors, cd.props, cellW);
      if (cd === col[0])            cell.style.borderRadius = '4px 4px 2px 2px';
      if (cd === col[col.length-1]) cell.style.borderRadius = '2px 2px 4px 4px';

      if (cd.isFullMix) cell.dataset.fullMix = '1';
      colEl.appendChild(cell);
    });
    wrapper.appendChild(colEl);
  });

  container.appendChild(wrapper);
  document.getElementById('swatch-count').textContent = `${total} teintes`;
}

// ── Info panel ──
// ── Bulle flottante ──────────────────────────────────────────────────────
const tooltipEl = document.getElementById('swatch-tooltip');

document.addEventListener('click', () => hideTooltip());

function hideTooltip() {
  tooltipEl.classList.remove('visible');
  if (selectedCell) { selectedCell.classList.remove('selected'); selectedCell = null; }
}

function showTooltip(cell, result, colors, props) {
  const total = props.reduce((a, b) => a + b, 0);
  const nonZero = props.map((p, i) => ({ p, i })).filter(x => x.p > 0);

  tooltipEl.innerHTML = `
    <div class="tip-swatch" style="background:${toHex(result)}"></div>
    <div class="tip-hex">${toHex(result).toUpperCase()}</div>
    <div class="tip-rgb">rgb(${result.join(', ')})</div>
    <div class="tip-props">
      ${nonZero.map(({ p, i }) => {
        const pct = total > 0 ? p / total * 100 : 0;
        return `<div class="tip-row">
          <div class="tip-dot" style="background:${toHex(colors[i])}"></div>
          <div class="tip-bar-bg"><div class="tip-bar" style="width:${pct}%"></div></div>
          <span class="tip-pct">${Math.round(pct)}%</span>
        </div>`;
      }).join('')}
    </div>`;

  // Positionnement
  tooltipEl.classList.add('visible');
  const tr   = cell.getBoundingClientRect();
  const tipW = tooltipEl.offsetWidth;
  const tipH = tooltipEl.offsetHeight;
  const margin = 10;

  // Essayer au-dessus, sinon en-dessous
  let top, dir;
  if (tr.top - tipH - margin >= 0) {
    top = tr.top - tipH - margin;
    dir = 'up';
  } else {
    top = tr.bottom + margin;
    dir = 'down';
  }

  // Centrer horizontalement sur la cellule, rester dans la fenêtre
  let left = tr.left + tr.width / 2 - tipW / 2;
  left = Math.max(margin, Math.min(window.innerWidth - tipW - margin, left));

  tooltipEl.style.top  = `${top}px`;
  tooltipEl.style.left = `${left}px`;
}
